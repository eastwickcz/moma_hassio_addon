stages:
  - deploy

sync_to_github:
  stage: deploy
  image: alpine:3.20
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git curl
  script:
    # Optionally create the GitHub repository if it does not exist yet.
    - |
      curl --silent --show-error --fail-with-body \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        -d "{\"name\":\"${GITHUB_REPO_NAME:-$CI_PROJECT_NAME}\",\"private\":false}" \
        https://api.github.com/user/repos || true

    - GITHUB_TARGET_REPO="${GITHUB_REPO_NAME:-$CI_PROJECT_NAME}"
    - git remote remove github || true
    - git remote add github "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_TARGET_REPO}.git"

    # GitLab CI often checks out a detached commit without local branch refs.
    # Fetch remote-tracking branches and tags explicitly, then mirror those refs.
    - git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
    - git fetch --prune origin '+refs/tags/*:refs/tags/*'

    # Mirror all branches and tags to GitHub.
    - git push --prune github '+refs/remotes/origin/*:refs/heads/*'
    - git push --prune github '+refs/tags/*:refs/tags/*'

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

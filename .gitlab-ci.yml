stages:
  - deploy

sync_to_github:
  stage: deploy
  image: alpine:3.20
  variables:
    GIT_STRATEGY: clone
  before_script:
    - apk add --no-cache git curl
  script:
    # Optionally create the GitHub repository if it does not exist yet.
    - |
      curl --silent --show-error --fail-with-body \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        -d "{\"name\":\"${GITHUB_REPO_NAME:-$CI_PROJECT_NAME}\",\"private\":false}" \
        https://api.github.com/user/repos || true

    - GITHUB_TARGET_REPO="${GITHUB_REPO_NAME:-$CI_PROJECT_NAME}"
    - git remote remove github || true
    - git remote add github "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_TARGET_REPO}.git"

    # Make sure full refs are available in CI clone.
    - git fetch --prune --unshallow origin || git fetch --prune origin

    # Mirror all branches and tags to GitHub.
    - git push --prune github '+refs/heads/*:refs/heads/*'
    - git push --prune github '+refs/tags/*:refs/tags/*'

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
